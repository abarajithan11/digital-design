name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/ucsd-cse140-s126/digital-design-amd64
  IMAGE_TAG: latest
  LIVE_SITE_URL: https://abapages.com/digital-design

jobs:
  build-pages-current:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx furo myst-parser

      - name: Download current live assets
        run: python scripts/download_live_assets.py --site-url "${LIVE_SITE_URL}" --out site

      - name: Build site with current assets
        run: make site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload current Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-current
          path: site

      - name: Upload current site snapshot
        uses: actions/upload-artifact@v4
        with:
          name: current-site-snapshot
          path: site

  deploy-current:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages-current
    steps:
      - name: Deploy current-assets site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-current

  sim:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: deploy-current
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space on runner
        run: |
          echo "Before cleanup:"; df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          docker system prune -af || true
          echo "After cleanup:"; df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI image
        run: docker pull "${GHCR_IMAGE}:${IMAGE_TAG}"

      - name: Run simulations and generate waveform SVGs
        run: make sim_outputs_all IMAGE="${GHCR_IMAGE}:${IMAGE_TAG}" SIM_MAX_TIME=800ns

      - name: Upload sim results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-results
          path: |
            out/sim
            out/sim-assets

  gds:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: deploy-current
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space on runner
        run: |
          echo "Before cleanup:"; df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          docker system prune -af || true
          echo "After cleanup:"; df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI image
        run: docker pull "${GHCR_IMAGE}:${IMAGE_TAG}"

      - name: Run RTL-to-GDS and copy layout images
        run: make gds_outputs_all IMAGE="${GHCR_IMAGE}:${IMAGE_TAG}"

      - name: Generate GLB assets
        if: always()
        run: make gds_glb_assets IMAGE="${GHCR_IMAGE}:${IMAGE_TAG}"

      - name: Upload GDS assets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gds-assets
          path: out/gds-assets

  build-pages:
    if: always()
    runs-on: ubuntu-latest
    needs: [sim, gds]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sim results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sim-results
          path: .

      - name: Download GDS assets
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: gds-assets
          path: out/gds-assets

      - name: Download current site snapshot
        uses: actions/download-artifact@v4
        with:
          name: current-site-snapshot
          path: site

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx furo myst-parser

      - name: Render 3D model fallbacks
        run: python scripts/render_3d_fallbacks.py

      - name: Build site
        run: make site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-fresh
          path: site

  deploy:
    if: ${{ always() && needs.build-pages.result == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-fresh
