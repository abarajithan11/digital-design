name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/cse140-openroad
  IMAGE_TAG: latest

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    outputs:
      docker_changed: ${{ steps.check-changes.outputs.docker_changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: check-changes
        name: Detect Dockerfile / Makefile changes
        shell: bash
        run: |
          set -e

          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"

          # First push to branch (no "before" commit)? Force rebuild.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "First push on this branch -> rebuild image"
            echo "docker_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Diffing $BEFORE..$SHA"
          files="$(git diff --name-only "$BEFORE" "$SHA" || true)"
          echo "Changed files:"
          echo "$files"

          if echo "$files" | grep -E '^(Dockerfile|Makefile)$' >/dev/null; then
            echo "Docker image inputs changed -> rebuild"
            echo "docker_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Dockerfile/Makefile changes -> reuse existing image"
            echo "docker_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.check-changes.outputs.docker_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        if: steps.check-changes.outputs.docker_changed == 'true'
        run: make CI_IMAGE="${GHCR_IMAGE}:${IMAGE_TAG}" ci-image

      - name: Push image to GHCR
        if: steps.check-changes.outputs.docker_changed == 'true'
        run: docker push "${GHCR_IMAGE}:${IMAGE_TAG}"

  sim:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space on runner
        run: |
          echo "Before cleanup:"; df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          docker system prune -af || true
          echo "After cleanup:"; df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI image
        run: docker pull "${GHCR_IMAGE}:${IMAGE_TAG}"

      - name: Run simulations and generate waveform SVGs
        run: make ci-sim CI_IMAGE="${GHCR_IMAGE}:${IMAGE_TAG}"

      - name: Upload sim results
        uses: actions/upload-artifact@v4
        with:
          name: sim-results
          path: |
            out/sim/status.tsv
            material/sim

  gds:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space on runner
        run: |
          echo "Before cleanup:"; df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          docker system prune -af || true
          echo "After cleanup:"; df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CI image
        run: docker pull "${GHCR_IMAGE}:${IMAGE_TAG}"

      - name: Run RTL-to-GDS and copy layout images
        run: make ci-gds CI_IMAGE="${GHCR_IMAGE}:${IMAGE_TAG}"

      - name: Upload GDS assets
        uses: actions/upload-artifact@v4
        with:
          name: gds-assets
          path: docs/assets/design-outputs

  build-pages:
    runs-on: ubuntu-latest
    needs: [sim, gds]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sim results
        uses: actions/download-artifact@v4
        with:
          name: sim-results
          path: .

      - name: Download GDS assets
        uses: actions/download-artifact@v4
        with:
          name: gds-assets
          path: docs/assets/design-outputs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate design outputs page
        run: python scripts/generate_outputs.py --generate-only

      - name: Build Sphinx site
        run: make ci-build-pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
