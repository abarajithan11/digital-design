name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run simulations
        run: make ci-sim CI_IMAGE=pages-layouts:latest

      - name: Upload sim results
        uses: actions/upload-artifact@v4
        with:
          name: sim-results
          path: out/sim/status.tsv

  gds:
    runs-on: ubuntu-latest
    needs: sim
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download sim results
        uses: actions/download-artifact@v4
        with:
          name: sim-results
          path: out/sim

      - name: Run gds and generate ASAP7 docs
        run: make ci-gds-docs CI_IMAGE=pages-layouts:latest

      - name: Upload ASAP7 docs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asap7-layout-docs
          path: |
            docs/asap7-layouts.md
            docs/assets/asap7-layouts

  build-pages:
    runs-on: ubuntu-latest
    needs: gds
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ASAP7 docs artifacts
        uses: actions/download-artifact@v4
        with:
          name: asap7-layout-docs
          path: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: make ci-build-pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
