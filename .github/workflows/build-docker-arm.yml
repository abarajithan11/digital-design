name: build-docker-arm

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    env:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      GHCR_USER: ${{ secrets.GHCR_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          echo "Before cleanup:"; df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          docker system prune -af || true
          echo "After cleanup:"; df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build arm64 image
        run: make image-scratch ARCH=arm64

      - name: Run simulations (verify arm64 image)
        run: make sim_outputs_all ARCH=arm64 SIM_MAX_TIME=800ns

      - name: Run RTL-to-GDS2 (verify arm64 image)
        run: make gds_outputs_all ARCH=arm64

      - name: Publish arm64 image
        run: make publish ARCH=arm64
