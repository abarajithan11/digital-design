name: arm64 image (from-source)

on:
  push:
    branches:
      - docker-arm64

permissions:
  contents: read
  packages: write

env:
  IMAGE: digital-design:arm64
  BASE_IMAGE: ghcr.io/${{ github.repository }}:orfs-arm64-base-26Q2
  PUSH: "1"

jobs:
  build-and-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          echo "Before cleanup:"; df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          docker system prune -af || true
          echo "After cleanup:"; df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build arm64 image
        run: IMAGE="${IMAGE}" BASE_IMAGE="${BASE_IMAGE}" PUSH="${PUSH}" scripts/build_arm64_image.sh

      - name: Disk usage after build
        if: always()
        run: df -h

      - name: Run all simulations
        run: make sim_outputs_all IMAGE="${IMAGE}"

      - name: Run all RTL-to-GDS
        run: make gds_outputs_all IMAGE="${IMAGE}"

      - name: Generate GLB assets
        if: always()
        run: make gds_glb_assets IMAGE="${IMAGE}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-all-designs
          path: |
            out/sim
            out/sim-assets
            out/gds-assets
